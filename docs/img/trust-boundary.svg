<svg viewBox="0 0 1080 740" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0d9488"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="1080" height="740" rx="16" fill="#ffffff"/>
  <rect x="1" y="1" width="1078" height="738" rx="15" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- title -->
  <text x="540" y="44" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Host-brokered credentials: the agent acts on its own — never as you</text>
  <text x="540" y="71" text-anchor="middle" font-size="14.5" fill="#64748b">The worker browses the web itself. But the model and every key live on the host — so it holds nothing of yours.</text>

  <!-- ===== TOP: external, split into two groups ===== -->
  <!-- YOUR ACCOUNTS (host-only) -->
  <text x="408" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#0d9488" letter-spacing="0.05em">YOUR ACCOUNTS · YOUR CREDENTIALS REQUIRED</text>
  <g font-size="12.5" fill="#334155" text-anchor="middle">
    <rect x="224" y="114" width="176" height="50" rx="9" fill="#f0fdfa" stroke="#0d9488"/>
    <text x="312" y="138" font-weight="600">External LLM API</text>
    <text x="312" y="155" font-size="11" fill="#0f766e">optional fallback · your key</text>
    <rect x="416" y="114" width="176" height="50" rx="9" fill="#f0fdfa" stroke="#0d9488"/>
    <text x="504" y="144" font-weight="600">Your email / mailbox</text>
  </g>

  <!-- PUBLIC WEB (worker-direct) -->
  <text x="872" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309" letter-spacing="0.05em">OPEN WEB · NO CREDENTIAL OF YOURS</text>
  <g font-size="12.5" fill="#334155" text-anchor="middle">
    <rect x="762" y="114" width="220" height="50" rx="9" fill="#fffbeb" stroke="#d97706"/>
    <text x="872" y="138" font-weight="600">Public web / any site</text>
    <text x="872" y="155" font-size="11" fill="#92400e">the agent's browser goes here directly</text>
  </g>

  <!-- host -> your accounts (up) -->
  <line x1="408" y1="240" x2="408" y2="168" stroke="#0d9488" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <text x="408" y="196" text-anchor="middle" font-size="11.5" fill="#0d9488" font-weight="600">uses your key here</text>
  <text x="408" y="211" text-anchor="middle" font-size="11" fill="#0d9488">keys never leave the host</text>

  <!-- worker -> public web (up) -->
  <line x1="872" y1="240" x2="872" y2="168" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrAmber)"/>
  <text x="872" y="196" text-anchor="middle" font-size="11.5" fill="#b45309" font-weight="600">browses directly</text>
  <text x="872" y="211" text-anchor="middle" font-size="11" fill="#b45309">its own identity · SSRF-guarded</text>

  <!-- ===== OPERATOR ===== -->
  <rect x="36" y="372" width="158" height="150" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">Operator</text>
  <text x="115" y="427" text-anchor="middle" font-size="12" fill="#3b5b8c">Compass app / phone</text>
  <line x1="54" y1="441" x2="176" y2="441" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="115" y="465" text-anchor="middle" font-size="12" fill="#334155">Approves or denies</text>
  <text x="115" y="483" text-anchor="middle" font-size="12" fill="#334155">risky actions.</text>
  <text x="115" y="505" text-anchor="middle" font-size="12" fill="#334155">No secret in the browser.</text>

  <!-- operator -> host -->
  <line x1="196" y1="442" x2="230" y2="442" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="213" y="430" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">approve</text>

  <!-- ===== TRUSTED HOST ===== -->
  <rect x="232" y="240" width="352" height="392" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5"/>
  <text x="408" y="269" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46" letter-spacing="0.04em">TRUSTED HOST</text>
  <text x="408" y="289" text-anchor="middle" font-size="12.5" fill="#047857"><tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">server.js</tspan> · your machine</text>

  <!-- secrets vault -->
  <rect x="258" y="302" width="300" height="128" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <g transform="translate(278,318)">
    <rect x="0" y="9" width="20" height="15" rx="3" fill="#f59e0b"/>
    <path d="M3.5 9 V6 a6.5 6.5 0 0 1 13 0 V9" fill="none" stroke="#f59e0b" stroke-width="2.4"/>
    <circle cx="10" cy="16" r="2" fill="#7c4a03"/>
  </g>
  <text x="308" y="333" font-size="13.5" font-weight="700" fill="#065f46">Your secrets vault</text>
  <text x="308" y="349" font-size="11.5" fill="#475569"><tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">data/</tspan> — gitignored, host-only</text>
  <g font-size="12" fill="#334155">
    <text x="278" y="374">• Provider &amp; model API keys</text>
    <text x="278" y="394">• SMTP / mailbox credentials</text>
    <text x="278" y="414">• Operator &amp; network tokens</text>
  </g>

  <!-- local model box -->
  <rect x="258" y="440" width="300" height="50" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="282" cy="465" r="8" fill="#6366f1"/>
  <text x="298" y="462" font-size="12.5" font-weight="700" fill="#3730a3">Local model — Ollama (qwen3)</text>
  <text x="298" y="479" font-size="11" fill="#4f46e5">the "brain" runs here, not on the worker</text>

  <text x="408" y="513" text-anchor="middle" font-size="12.5" font-weight="600" fill="#065f46">Runs the model and makes every credentialed</text>
  <text x="408" y="531" text-anchor="middle" font-size="12" fill="#047857">call. Gates risky actions on your approval;</text>
  <text x="408" y="549" text-anchor="middle" font-size="12" fill="#047857">only host-verifiable typed actions auto-run.</text>
  <text x="408" y="571" text-anchor="middle" font-size="11.5" fill="#059669" font-style="italic">keys &amp; model never cross the boundary</text>

  <!-- ===== TRUST BOUNDARY ===== -->
  <line x1="638" y1="228" x2="638" y2="640" stroke="#dc2626" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="638" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" letter-spacing="0.1em">TRUST BOUNDARY</text>

  <!-- ===== UNTRUSTED WORKER ===== -->
  <rect x="692" y="240" width="360" height="392" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="9 5"/>
  <text x="872" y="269" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b" letter-spacing="0.04em">UNTRUSTED WORKER</text>
  <text x="872" y="289" text-anchor="middle" font-size="12.5" fill="#b91c1c">OpenClaw VM — the AI agent's hands</text>

  <!-- HAS (its own) -->
  <rect x="714" y="302" width="320" height="120" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="730" y="323" font-size="12.5" font-weight="700" fill="#b45309">Has — its own, on the VM</text>
  <g font-size="12" fill="#334155">
    <text x="730" y="345">• The agent loop + browser, shell, files</text>
    <text x="730" y="365">• Downloads &amp; local automation</text>
    <text x="730" y="385">• Its own scoped low-trust accounts</text>
    <text x="744" y="403" fill="#b45309" font-style="italic">(never yours)</text>
  </g>

  <!-- does NOT have -->
  <rect x="714" y="434" width="320" height="70" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="872" y="456" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991b1b">Does NOT have: your keys, your</text>
  <text x="872" y="474" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991b1b">mailbox, your tokens — or the model.</text>
  <text x="872" y="493" text-anchor="middle" font-size="11.5" fill="#b91c1c" font-style="italic">it must ask the host even to think</text>

  <text x="872" y="527" text-anchor="middle" font-size="12" fill="#b91c1c">Assume it can be prompt-injected or fully</text>
  <text x="872" y="545" text-anchor="middle" font-size="12" fill="#b91c1c">compromised — which is exactly why it</text>
  <text x="872" y="563" text-anchor="middle" font-size="12" fill="#b91c1c">holds nothing of yours.</text>

  <!-- worker -> host (request) -->
  <line x1="690" y1="330" x2="586" y2="330" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrRed)"/>
  <text x="638" y="316" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="700">① request</text>
  <text x="638" y="352" text-anchor="middle" font-size="10.5" fill="#b91c1c">think ·</text>
  <text x="638" y="365" text-anchor="middle" font-size="10.5" fill="#b91c1c">act-as-me</text>

  <!-- host -> worker (result) -->
  <line x1="586" y1="392" x2="690" y2="392" stroke="#475569" stroke-width="2.5" marker-end="url(#arrSlate)"/>
  <text x="638" y="410" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">③ result</text>

  <!-- host uses your accounts numbered -->
  <text x="408" y="181" text-anchor="middle" font-size="11" fill="#0d9488" font-weight="700">②</text>

  <!-- punchline banner -->
  <rect x="36" y="662" width="1008" height="52" rx="10" fill="#0f172a"/>
  <text x="540" y="694" text-anchor="middle" font-size="16.5" font-weight="700" fill="#ffffff">Compromise the worker completely and it still can't act as you — or even think without the host.</text>
</svg>
