<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Compass">
  <rect width="512" height="512" rx="104" fill="#101828"/>
  <!-- dial face -->
  <circle cx="256" cy="256" r="158" fill="#0e1626"/>
  <circle cx="256" cy="256" r="158" fill="none" stroke="#2b3752" stroke-width="12"/>
  <!-- cardinal ticks -->
  <g fill="#4a5a78">
    <rect x="249" y="112" width="14" height="30" rx="5"/>
    <rect x="249" y="370" width="14" height="30" rx="5"/>
    <rect x="112" y="249" width="30" height="14" rx="5"/>
    <rect x="370" y="249" width="30" height="14" rx="5"/>
  </g>
  <!-- needle: north (teal) / south (slate) -->
  <path d="M256 160 L280 256 L232 256 Z" fill="#2dd4bf"/>
  <path d="M256 352 L232 256 L280 256 Z" fill="#8aa0bf"/>
  <!-- center pin -->
  <circle cx="256" cy="256" r="21" fill="#101828"/>
  <circle cx="256" cy="256" r="21" fill="none" stroke="#f8fafc" stroke-width="9"/>
  <circle cx="256" cy="256" r="5" fill="#2dd4bf"/>
</svg>
